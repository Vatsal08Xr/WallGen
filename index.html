                        <button class="option-btn palette-btn h-10 rounded-md border border-zinc-200 dark:border-zinc-800 overflow-hidden flex" data-palette="midnight" title="Midnight"><div class="flex-1 bg-[#64748b]"></div><div class="flex-1 bg-[#3b82f6]"></div><div class="flex-1 bg-[#0f172a]"></div></button>
                        <button class="option-btn palette-btn h-10 rounded-md border border-zinc-200 dark:border-zinc-800 overflow-hidden flex" data-palette="neon" title="Neon"><div class="flex-1 bg-[#39ff14]"></div><div class="flex-1 bg-[#0ff0fc]"></div><div class="flex-1 bg-[#ff007f]"></div></button>
                        <button class="option-btn palette-btn h-10 rounded-md border border-zinc-200 dark:border-zinc-800 overflow-hidden flex" data-palette="forest" title="Forest"><div class="flex-1 bg-[#86efac]"></div><div class="flex-1 bg-[#22c55e]"></div><div class="flex-1 bg-[#064e3b]"></div></button>
                        <button class="option-btn palette-btn h-10 rounded-md border border-zinc-200 dark:border-zinc-800 overflow-hidden flex" data-palette="pastel" title="Pastel"><div class="flex-1 bg-[#fed7aa]"></div><div class="flex-1 bg-[#d9f99d]"></div><div class="flex-1 bg-[#a5f3fc]"></div></button>
                        <button class="option-btn palette-btn h-10 rounded-md border border-zinc-200 dark:border-zinc-800 flex items-center justify-center gap-1 col-span-4" data-palette="custom" title="Custom Palette">
                            <i data-lucide="palette" class="w-4 h-4"></i> <span class="text-sm font-medium">Custom Palette</span>
                        </button>
                    </div>
                    <div id="mobile-custom-palette-editor" class="hidden p-3 rounded-md bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 space-y-3 mt-2">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-medium">Background</span>
                            <input type="color" id="mobile-custom-bg-color" value="#18181b">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-medium">Accents</span>
                            <div class="flex gap-2">
                                <input type="color" class="mobile-custom-accent-color" value="#3b82f6">
                                <input type="color" class="mobile-custom-accent-color" value="#8b5cf6">
                                <input type="color" class="mobile-custom-accent-color" value="#ec4899">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile action bar (Fixed at bottom) -->
        <div class="absolute bottom-0 left-0 right-0 z-30 flex gap-2 px-4 py-3 bg-white dark:bg-zinc-900 border-t border-zinc-200 dark:border-zinc-800 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <button id="mobile-btn-generate" class="flex-1 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 font-semibold py-2.5 px-3 rounded-md text-sm flex items-center justify-center gap-2 shadow-sm">
                <i data-lucide="shuffle" class="w-4 h-4"></i> Generate
            </button>
            <button id="mobile-btn-dl-desktop" title="Download Desktop 4K" class="flex items-center gap-1.5 px-3 py-2.5 rounded-md border border-zinc-300 dark:border-zinc-700 text-sm font-medium hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors bg-white dark:bg-zinc-900 shadow-sm">
                <i data-lucide="monitor" class="w-4 h-4 text-zinc-500"></i>
            </button>
            <button id="mobile-btn-dl-iphone" title="Download Mobile" class="flex items-center gap-1.5 px-3 py-2.5 rounded-md border border-zinc-300 dark:border-zinc-700 text-sm font-medium hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors bg-white dark:bg-zinc-900 shadow-sm">
                <i data-lucide="smartphone" class="w-4 h-4 text-zinc-500"></i>
            </button>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/mobile.js"></script>
</body>
</html>
